<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum Scalper Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stats-container {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .balance-card {
            background: var(--card-bg);
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            text-align: right;
            min-width: 150px;
        }

        .roi-card {
            border-left: 3px solid var(--accent);
        }

        .balance-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .balance-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .roi-positive { color: var(--success); }
        .roi-negative { color: var(--danger); }

        .chart-container {
            background: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            height: 300px;
        }

        .trades-table-container {
            background: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            color: var(--text-secondary);
            font-weight: 600;
            padding: 0.75rem;
            border-bottom: 2px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .pnl-positive { color: var(--success); font-weight: 600; }
        .pnl-negative { color: var(--danger); font-weight: 600; }

        .row-win { background: rgba(34, 197, 94, 0.05); }
        .row-loss { background: rgba(239, 68, 68, 0.05); }

        .uptime-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .card h2 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pos-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-long { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge-short { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .stat-label { color: var(--text-secondary); font-size: 0.875rem; }
        .stat-value { font-weight: 600; }

        .history-section {
            background: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            padding: 1.5rem;
        }

        .history-list {
            list-style: none;
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
        }

        .history-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .history-item:last-child { border-bottom: none; }

        .tag-order { color: var(--accent); }
        .tag-closed { color: var(--success); }
        .tag-error { color: var(--danger); }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
            .stats-container { 
                flex-direction: column; 
                width: 100%; 
                gap: 0.75rem; 
            }
            .balance-card { width: 100%; text-align: left; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>⚡ MOMENTUM SCALPER</h1>
                <p style="color: var(--text-secondary); font-size: 0.875rem;">Live Trading Terminal</p>
            </div>
            <div class="stats-container">
                <div class="balance-card">
                    <div class="balance-label">Total ROI</div>
                    <div class="balance-value" id="total-roi">0.00%</div>
                </div>
                <div class="balance-card">
                    <div class="balance-label">Daily ROI</div>
                    <div class="balance-value" id="daily-roi">0.00%</div>
                </div>
                <div class="balance-card roi-card">
                    <div class="balance-label">Current Balance</div>
                    <div class="balance-value" id="balance-display" style="color: var(--success)">$0.00</div>
                </div>
            </div>
        </header>

        <section>
            <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Performance Chart</h2>
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </section>

        <section>
            <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Daily Bot Activity</h2>
            <div class="trades-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Active Duration</th>
                            <th>Total Trades</th>
                            <th>Net PnL</th>
                        </tr>
                    </thead>
                    <tbody id="uptime-body">
                        <!-- Uptime stats will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Active Positions</h2>
            <div class="grid" id="positions-grid">
                <!-- Positions will be injected here -->
            </div>
        </section>

        <section>
            <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Past Trades</h2>
            <div class="trades-table-container">
                <table id="trades-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Pair</th>
                            <th>Reason</th>
                            <th>PnL</th>
                            <th>Balance</th>
                        </tr>
                    </thead>
                    <tbody id="trades-body">
                        <!-- Trades will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="history-section">
            <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Recent Activity</h2>
            <div class="history-list" id="history-list">
                <!-- History will be injected here -->
            </div>
        </section>
    </div>

    <script>
        let performanceChart = null;

        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function updateChart(trades, initialBalance) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            const labels = ['Start', ...trades.map(t => t.time)];
            const dataPoints = [initialBalance];
            let currentBalance = initialBalance;
            
            trades.forEach(t => {
                if (t.balance) {
                    currentBalance = t.balance;
                } else {
                    currentBalance += t.pnl;
                }
                dataPoints.push(currentBalance);
            });

            if (performanceChart) {
                performanceChart.data.labels = labels;
                performanceChart.data.datasets[0].data = dataPoints;
                performanceChart.update();
            } else {
                performanceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Account Balance (USDT)',
                            data: dataPoints,
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 2,
                            pointBackgroundColor: '#38bdf8'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                display: false
                            },
                            y: {
                                grid: { color: '#334155' },
                                ticks: { color: '#94a3b8' }
                            }
                        }
                    }
                });
            }
        }

        function updateUI(data) {
            // Update Balance
            document.getElementById('balance-display').textContent = `$${data.balance.toFixed(2)}`;

            // ROI Calculations
            const initial = data.initialBalance;
            const current = data.balance;
            const totalRoi = ((current - initial) / initial) * 100;
            
            const start = new Date(data.startTime);
            const now = new Date();
            const diffDays = Math.max(0.1, (now - start) / (1000 * 60 * 60 * 24));
            const dailyRoi = totalRoi / diffDays;

            const totalRoiEl = document.getElementById('total-roi');
            totalRoiEl.textContent = `${totalRoi.toFixed(3)}%`;
            totalRoiEl.className = `balance-value ${totalRoi >= 0 ? 'roi-positive' : 'roi-negative'}`;

            const dailyRoiEl = document.getElementById('daily-roi');
            dailyRoiEl.textContent = `${dailyRoi.toFixed(3)}%`;
            dailyRoiEl.className = `balance-value ${dailyRoi >= 0 ? 'roi-positive' : 'roi-negative'}`;

            // Update Chart
            updateChart(data.trades, data.initialBalance);

            // Update Uptime Table
            const uptimeBody = document.getElementById('uptime-body');
            uptimeBody.innerHTML = data.uptime.map(day => `
                <tr>
                    <td style="font-weight: 600;">${day.date}</td>
                    <td><span class="uptime-badge">⏱ ${day.duration}</span></td>
                    <td style="text-align: center;">${day.trades}</td>
                    <td class="${day.pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}">${day.pnl >= 0 ? '+' : ''}$${day.pnl.toFixed(2)}</td>
                </tr>
            `).join('');

            // Update Trades Table
            const tradesBody = document.getElementById('trades-body');
            tradesBody.innerHTML = data.trades.slice().reverse().map(trade => `
                <tr class="${trade.pnl >= 0 ? 'row-win' : 'row-loss'}">
                    <td style="color: var(--text-secondary); font-size: 0.75rem;">${trade.time}</td>
                    <td style="font-weight: 700; color: var(--accent);">${trade.pair}</td>
                    <td><span style="font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 0.25rem; background: rgba(148, 163, 184, 0.1); border: 1px solid rgba(148, 163, 184, 0.2);">${trade.reason}</span></td>
                    <td class="${trade.pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}">${trade.pnl >= 0 ? '▲' : '▼'} $${Math.abs(trade.pnl).toFixed(2)}</td>
                    <td style="font-weight: 700; color: var(--text-primary);">$${trade.balance ? trade.balance.toFixed(2) : '---'}</td>
                </tr>
            `).join('');

            // Update Positions
            const grid = document.getElementById('positions-grid');
            if (data.positions.length === 0) {
                grid.innerHTML = '<div style="color: var(--text-secondary); padding: 2rem; text-align: center; grid-column: 1/-1;">No active positions</div>';
            } else {
                grid.innerHTML = data.positions.map(pos => {
                    const distToTp = Math.abs(pos.currentPrice - pos.takeProfitPrice);
                    const distToSl = Math.abs(pos.currentPrice - pos.stopLossPrice);
                    const closerToTp = distToTp < distToSl;
                    const priceColor = closerToTp ? 'var(--success)' : 'var(--danger)';

                    return `
                    <div class="card" style="border-top: 4px solid ${priceColor}">
                        <span class="pos-badge ${pos.direction === 'LONG' ? 'badge-long' : 'badge-short'}">${pos.direction}</span>
                        <h2>${pos.pair}</h2>
                        <div class="stat-row" style="margin-bottom: 1rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 0.5rem;">
                            <span class="stat-label">Current Price</span>
                            <span class="stat-value" style="color: ${priceColor}; font-size: 1.25rem;">$${pos.currentPrice.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Entry Price</span>
                            <span class="stat-value">$${pos.entryPrice.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Take Profit</span>
                            <span class="stat-value" style="color: var(--success)">$${pos.takeProfitPrice.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Stop Loss</span>
                            <span class="stat-value" style="color: var(--danger)">$${pos.stopLossPrice.toLocaleString()}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Size</span>
                            <span class="stat-value">${pos.contractSize}</span>
                        </div>
                        <div class="stat-row" style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                            <span class="stat-label">Exit Progress</span>
                        </div>
                        <div style="height: 8px; background: #334155; border-radius: 4px; margin: 0.5rem 0; overflow: hidden; display: flex;">
                            <div style="width: ${Math.min(100, (distToSl / (distToTp + distToSl)) * 100)}%; background: var(--danger); opacity: 0.6;"></div>
                            <div style="width: ${Math.min(100, (distToTp / (distToTp + distToSl)) * 100)}%; background: var(--success); opacity: 0.6;"></div>
                        </div>
                        <div class="stat-row" style="font-size: 0.75rem;">
                            <span style="color: var(--danger)">SL: ${((distToSl / pos.currentPrice) * 100).toFixed(2)}%</span>
                            <span style="color: var(--success)">TP: ${((distToTp / pos.currentPrice) * 100).toFixed(2)}%</span>
                        </div>
                        <div class="stat-row" style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 0.5rem;">
                            <span class="stat-label">Opened</span>
                            <span class="stat-value" style="font-size: 0.75rem; color: var(--text-secondary)">${pos.timestamp}</span>
                        </div>
                    </div>
                `}).join('');
            }

            // Update History
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = data.history.map(line => {
                let formattedLine = line;
                if (line.includes('[ORDER]')) {
                    formattedLine = `<span class="tag-order">[ORDER]</span>` + line.split('[ORDER]')[1];
                } else if (line.includes('[CLOSED]')) {
                    formattedLine = `<span class="tag-closed">[CLOSED]</span>` + line.split('[CLOSED]')[1];
                }
                
                const timestampMatch = line.match(/^\[(.*?)\]/);
                const timestamp = timestampMatch ? `<span style="color: var(--text-secondary)">[${timestampMatch[1]}]</span> ` : '';
                const content = formattedLine.replace(/^\[.*?\]/, '').trim();

                return `<div class="history-item">${timestamp}${content}</div>`;
            }).join('');
        }

        // Initial fetch and set interval
        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
